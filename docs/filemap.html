<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>career-ops — File Map</title>
<style>
  :root {
    --user:#3b82f6; --user-bg:#eff6ff; --user-bd:#bfdbfe;
    --brain:#0d9488; --brain-bg:#f0fdfa; --brain-bd:#99f6e4;
    --script:#7c3aed; --script-bg:#f5f3ff; --script-bd:#ddd6fe;
    --output:#16a34a; --output-bg:#f0fdf4; --output-bd:#bbf7d0;
    --cfg:#d97706; --cfg-bg:#fffbeb; --cfg-bd:#fde68a;
    --docs:#6b7280; --docs-bg:#f9fafb; --docs-bd:#e5e7eb;
    --ci:#db2777; --ci-bg:#fdf2f8; --ci-bd:#fbcfe8;
    --asset:#0ea5e9; --asset-bg:#f0f9ff; --asset-bd:#bae6fd;
    --dark:#111827; --border:#e5e7eb; --gray:#6b7280;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:13px; background:#f8fafc; color:var(--dark); display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  /* TOP BAR */
  .topbar { background:var(--dark); color:#e5e7eb; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-shrink:0; z-index:10; }
  .topbar h1 { font-size:14px; font-weight:700; color:#fff; }
  .topbar a { font-size:11px; color:#9ca3af; text-decoration:none; padding:3px 10px; border-radius:20px; background:#374151; }
  .topbar a:hover { background:#4f46e5; color:#fff; }
  .search-wrap { margin-left:auto; display:flex; align-items:center; gap:8px; }
  #search { background:#374151; border:1px solid #4b5563; border-radius:6px; color:#e5e7eb; font-size:12px; padding:5px 10px; width:200px; outline:none; }
  #search:focus { border-color:#6366f1; }
  #search::placeholder { color:#9ca3af; }

  /* FILTER ROWS */
  .filters { background:#1f2937; padding:5px 18px; display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; align-items:center; border-bottom:1px solid #374151; }
  .filters:last-of-type { border-bottom:none; }
  .filters-label { font-size:10px; font-weight:700; color:#6b7280; letter-spacing:.05em; text-transform:uppercase; min-width:52px; }
  .fp { font-size:10px; font-weight:600; padding:3px 10px; border-radius:20px; cursor:pointer; border:1.5px solid transparent; transition:all .15s; }

  /* Type filter pills */
  .fp[data-t="all"]    { background:#374151; color:#d1d5db; border-color:#4b5563; }
  .fp[data-t="user"]   { background:var(--user-bg); color:var(--user); border-color:var(--user-bd); }
  .fp[data-t="brain"]  { background:var(--brain-bg); color:var(--brain); border-color:var(--brain-bd); }
  .fp[data-t="script"] { background:var(--script-bg); color:var(--script); border-color:var(--script-bd); }
  .fp[data-t="cfg"]    { background:var(--cfg-bg); color:var(--cfg); border-color:var(--cfg-bd); }
  .fp[data-t="docs"]   { background:var(--docs-bg); color:var(--docs); border-color:var(--docs-bd); }
  .fp[data-t="ci"]     { background:var(--ci-bg); color:var(--ci); border-color:var(--ci-bd); }

  /* Role filter pills */
  .fp[data-r="all"]       { background:#374151; color:#d1d5db; border-color:#4b5563; }
  .fp[data-r="configure"] { background:#fef3c7; color:#92400e; border-color:#fde68a; }
  .fp[data-r="ai"]        { background:#cffafe; color:#164e63; border-color:#a5f3fc; }
  .fp[data-r="info"]      { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
  .fp[data-r="system"]    { background:#f5f3ff; color:#5b21b6; border-color:#ddd6fe; }

  .fp.active { opacity:1; box-shadow:0 0 0 2px #6366f1; }
  .fp:not(.active) { opacity:.65; }

  /* MAIN LAYOUT */
  .layout { display:flex; flex:1; overflow:hidden; }

  /* TREE */
  .tree-panel { width:310px; flex-shrink:0; overflow-y:auto; background:#fff; border-right:1px solid var(--border); padding:10px 0; }
  .tree-panel::-webkit-scrollbar { width:4px; }
  .tree-panel::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }

  .dir-label { display:flex; align-items:center; gap:6px; padding:4px 14px; cursor:pointer; font-size:11.5px; font-weight:700; color:#374151; text-transform:uppercase; letter-spacing:.04em; user-select:none; }
  .dir-label:hover { background:#f9fafb; }
  .dir-label .arrow { font-size:9px; color:#9ca3af; transition:transform .15s; }
  .dir-label.open .arrow { transform:rotate(90deg); }
  .dir-children { display:none; }
  .dir-label.open + .dir-children { display:block; }

  .file-row { display:flex; align-items:center; gap:7px; padding:4px 10px 4px 26px; cursor:pointer; transition:background .1s; }
  .file-row:hover { background:#f3f4f6; }
  .file-row.active { background:#ede9fe; }
  .file-row .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .file-row .name { font-size:11.5px; font-family:'SF Mono',Consolas,monospace; color:#374151; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .file-row.hidden { display:none; }

  /* Role indicator dot — right edge of tree row */
  .role-pip { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-left:2px; opacity:.85; }

  /* DETAIL PANEL */
  .detail-panel { flex:1; overflow-y:auto; padding:28px 32px; }
  .detail-panel::-webkit-scrollbar { width:4px; }
  .detail-panel::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }

  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60%; color:#9ca3af; text-align:center; gap:10px; }
  .empty-state .big { font-size:48px; }
  .empty-state p { font-size:13px; }

  .file-card { max-width:720px; }
  .file-card-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:20px; }
  .file-icon { width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .file-card-header h2 { font-size:20px; font-weight:700; font-family:'SF Mono',Consolas,monospace; margin-bottom:4px; }
  .file-path-full { font-size:11px; color:var(--gray); font-family:monospace; margin-bottom:8px; }
  .badges-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }

  .type-badge { display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:2px 8px; border-radius:4px; border:1.5px solid; }
  .role-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:2px 8px; border-radius:4px; border:1.5px solid; }
  .rb-configure { background:#fef3c7; color:#92400e; border-color:#fde68a; }
  .rb-ai        { background:#cffafe; color:#164e63; border-color:#a5f3fc; }
  .rb-info      { background:#f3f4f6; color:#4b5563; border-color:#d1d5db; }
  .rb-system    { background:#f5f3ff; color:#5b21b6; border-color:#ddd6fe; }

  .update-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; border:1.5px solid; }
  .ub-safe { background:#dcfce7; color:#166534; border-color:#86efac; }
  .ub-risk { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
  .ub-na   { background:#f3f4f6; color:#6b7280; border-color:#e5e7eb; }

  .section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--gray); margin:18px 0 8px; }
  .desc-text { font-size:13px; color:#374151; line-height:1.7; background:#f9fafb; border:1px solid var(--border); border-radius:8px; padding:14px 16px; }

  .tag-row { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:11px; font-family:monospace; font-weight:500; padding:3px 9px; border-radius:5px; background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; }
  .tag.reads    { background:#eff6ff; color:#1e40af; border-color:#bfdbfe; }
  .tag.writes   { background:#f0fdf4; color:#166534; border-color:#bbf7d0; }
  .tag.calls    { background:#f5f3ff; color:#5b21b6; border-color:#ddd6fe; }
  .tag.calledby { background:#fffbeb; color:#92400e; border-color:#fde68a; }

  /* stats bar */
  .stats { display:flex; gap:10px; flex-wrap:wrap; padding:7px 18px; background:#fff; border-bottom:1px solid var(--border); flex-shrink:0; }
  .stat { font-size:11px; display:flex; align-items:center; gap:5px; }
  .stat .dot { width:8px; height:8px; border-radius:50%; }
  .stat strong { font-weight:700; }

  /* Legend row */
  .legend { display:flex; gap:14px; flex-wrap:wrap; padding:5px 18px; background:#f9fafb; border-bottom:1px solid var(--border); flex-shrink:0; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:10.5px; color:#6b7280; }
  .legend-item .role-pip { width:8px; height:8px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>career-ops / File Map</h1>
  <a href="architecture.html">← Architecture Map</a>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="Search files…" oninput="filterFiles(this.value)">
  </div>
</div>

<div class="filters" id="type-filters">
  <span class="filters-label">Filter</span>
  <span class="fp active" data-t="all"    onclick="setTypeFilter('all')">All files</span>
  <span class="fp" data-t="user"          onclick="setTypeFilter('user')">🔵 User Layer</span>
  <span class="fp" data-t="brain"         onclick="setTypeFilter('brain')">🟢 Brain Layer</span>
  <span class="fp" data-t="script"        onclick="setTypeFilter('script')">🟣 Scripts</span>
  <span class="fp" data-t="cfg"           onclick="setTypeFilter('cfg')">🟠 Config</span>
  <span class="fp" data-t="docs"          onclick="setTypeFilter('docs')">⚫ Docs/Assets</span>
  <span class="fp" data-t="ci"            onclick="setTypeFilter('ci')">🔴 CI/GitHub</span>
</div>


<div class="legend">
  <span style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;">Right dot = how it's used:</span>
  <span class="legend-item"><span class="role-pip" style="background:#f59e0b;border-radius:50%;display:inline-block;"></span>You configure</span>
  <span class="legend-item"><span class="role-pip" style="background:#0891b2;border-radius:50%;display:inline-block;"></span>AI instructions</span>
  <span class="legend-item"><span class="role-pip" style="background:#9ca3af;border-radius:50%;display:inline-block;"></span>Reference only</span>
  <span class="legend-item"><span class="role-pip" style="background:#7c3aed;border-radius:50%;display:inline-block;"></span>System / auto</span>
</div>

<div class="stats" id="stats"></div>

<div class="layout">
  <div class="tree-panel" id="tree"></div>
  <div class="detail-panel" id="detail">
    <div class="empty-state">
      <div class="big">📂</div>
      <p>Click any file to see what it does,<br>what it reads, and what invokes it.</p>
    </div>
  </div>
</div>

<script>
// ── FILE CATALOG ─────────────────────────────────────────────────────────────
// role: "configure" = you edit this  |  "ai" = AI reads/follows this
//       "info" = reference/docs only |  "system" = runs automatically
const FILES = [
  // ROOT — USER
  { path:"cv.md", type:"user", role:"configure", icon:"📄", desc:"Master CV — the single source of truth for all your experience, metrics, and proof points. Read at the start of every evaluation. Never hardcode metrics anywhere else — always read from here.", reads:[], writes:[], calls:[], calledby:["modes/_shared.md","modes/pdf.md","modes/oferta.md"], update:"safe" },
  { path:"portals.yml", type:"user", role:"configure", icon:"🔍", desc:"Defines 45+ companies to scan with their ATS type (Greenhouse/Ashby/Lever), API slug, and keyword filters. The scanner reads this file to know where to look and what to surface.", reads:[], writes:[], calls:[], calledby:["scan.mjs","modes/scan.md"], update:"safe" },
  { path:"article-digest.md", type:"user", role:"configure", icon:"📝", desc:"Optional but powerful. Detailed proof points, metrics, and case studies from your portfolio/articles. Overrides cv.md for specific metrics. Read alongside cv.md in every evaluation.", reads:[], writes:[], calls:[], calledby:["modes/_shared.md"], update:"safe" },

  // ROOT — BRAIN
  { path:"CLAUDE.md", type:"brain", role:"ai", icon:"🧠", desc:"The agent's standing instructions — automatically loaded into context every session. Contains: data contract rules, scoring system overview, onboarding flow, skill mode routing table, and ethical guidelines. The most important single file in the system.", reads:[], writes:[], calls:["modes/_shared.md","modes/*.md"], calledby:["Claude Code (auto-loaded)"], update:"risk" },
  { path:"AGENTS.md", type:"brain", role:"ai", icon:"🤖", desc:"Agent-platform-specific instructions that extend CLAUDE.md. Used by non-Claude agents (Gemini, Qwen, etc.). Contains the same core rules formatted for agent SDK contexts.", reads:[], writes:[], calls:[], calledby:["Agent SDK platforms"], update:"risk" },
  { path:"GEMINI.md", type:"brain", role:"ai", icon:"♊", desc:"Gemini CLI equivalent of CLAUDE.md. Loaded automatically when using Google Gemini CLI in this project directory.", reads:[], writes:[], calls:[], calledby:["Gemini CLI (auto-loaded)"], update:"risk" },

  // ROOT — CONFIG
  { path:"VERSION", type:"cfg", role:"system", icon:"🏷️", desc:"Plain text file containing the current semantic version (e.g. '1.7.0'). Read by update-system.mjs to compare against the remote version on GitHub.", reads:[], writes:[], calls:[], calledby:["update-system.mjs"], update:"risk" },
  { path:"package.json", type:"cfg", role:"system", icon:"📦", desc:"Node.js project manifest. Declares Playwright as the main dependency (used by generate-pdf.mjs and liveness-browser.mjs). Also defines the 'doctor' npm script.", reads:[], writes:[], calls:[], calledby:["npm install","doctor.mjs"], update:"risk" },
  { path:"package-lock.json", type:"cfg", role:"system", icon:"🔒", desc:"Locked exact versions of all npm dependencies. Auto-generated by npm. Ensures everyone using the repo gets identical package versions.", reads:[], writes:[], calls:[], calledby:["npm install"], update:"risk" },
  { path:".gitignore", type:"cfg", role:"system", icon:"🚫", desc:"Tells Git which files to never track. Key exclusions: output/ (generated PDFs), node_modules/, batch/logs/, .env, .update-dismissed, .update-lock.", reads:[], writes:[], calls:[], calledby:["git"], update:"risk" },
  { path:".env.example", type:"cfg", role:"configure", icon:"🔑", desc:"Template showing what environment variables the system can use. Copy to .env and fill in values. Currently minimal — mainly for optional API keys.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:".envrc", type:"cfg", role:"system", icon:"⚙️", desc:"direnv configuration. Auto-loads .env variables into your shell when you cd into the project directory. Optional — only relevant if you use direnv.", reads:[".env"], writes:[], calls:[], calledby:["direnv"], update:"risk" },
  { path:"renovate.json", type:"cfg", role:"system", icon:"🔄", desc:"Renovate bot configuration. Tells the automated dependency updater how to handle npm package updates — which ones to auto-merge, how often to check.", reads:[], writes:[], calls:[], calledby:["Renovate bot"], update:"risk" },
  { path:".coderabbit.yaml", type:"cfg", role:"system", icon:"🐰", desc:"CodeRabbit AI code review configuration. Controls how the AI reviewer behaves on pull requests — tone, focus areas, which files to ignore.", reads:[], writes:[], calls:[], calledby:["CodeRabbit (on PRs)"], update:"risk" },
  { path:"release-please-config.json", type:"cfg", role:"system", icon:"🚀", desc:"Release Please configuration. Defines how automated versioning works: which packages to version, the changelog format, and release branch strategy.", reads:[], writes:[], calls:[], calledby:["release-please (GitHub Action)"], update:"risk" },
  { path:".release-please-manifest.json", type:"cfg", role:"system", icon:"📋", desc:"Tracks the current version for each package managed by release-please. Auto-updated by the release workflow.", reads:[], writes:[], calls:[], calledby:["release-please"], update:"risk" },
  { path:"flake.nix", type:"cfg", role:"system", icon:"❄️", desc:"Nix development environment definition. Reproducible dev environment for Nix/NixOS users. Optional — only relevant if you use the Nix package manager.", reads:[], writes:[], calls:[], calledby:["nix develop"], update:"risk" },
  { path:"flake.lock", type:"cfg", role:"system", icon:"❄️", desc:"Locked Nix package versions. Auto-generated companion to flake.nix. Ensures reproducible builds in Nix environments.", reads:[], writes:[], calls:[], calledby:["nix"], update:"risk" },

  // ROOT — DOCS
  { path:"README.md", type:"docs", role:"info", icon:"📖", desc:"Main project documentation. Overview, quick-start guide, feature list, and links to deeper docs. The first thing anyone sees when visiting the repo.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.es.md", type:"docs", role:"info", icon:"🇪🇸", desc:"Spanish translation of README.md. Maintained for the Spanish-speaking community.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.cn.md", type:"docs", role:"info", icon:"🇨🇳", desc:"Simplified Chinese translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.ja.md", type:"docs", role:"info", icon:"🇯🇵", desc:"Japanese translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.ko-KR.md", type:"docs", role:"info", icon:"🇰🇷", desc:"Korean translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.pt-BR.md", type:"docs", role:"info", icon:"🇧🇷", desc:"Brazilian Portuguese translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.ru.md", type:"docs", role:"info", icon:"🇷🇺", desc:"Russian translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.ua.md", type:"docs", role:"info", icon:"🇺🇦", desc:"Ukrainian translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"README.zh-TW.md", type:"docs", role:"info", icon:"🇹🇼", desc:"Traditional Chinese translation of README.md.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"CHANGELOG.md", type:"docs", role:"info", icon:"📜", desc:"Auto-generated changelog. Every version's new features, bug fixes, and breaking changes. Updated automatically by the release-please GitHub Action.", reads:[], writes:[], calls:[], calledby:["release-please"], update:"risk" },
  { path:"DATA_CONTRACT.md", type:"docs", role:"info", icon:"📜", desc:"The most important documentation file. Defines which files belong to the user layer (never auto-updated) vs. the system layer (auto-updatable). Read this before making any customizations.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"CONTRIBUTING.md", type:"docs", role:"info", icon:"🤝", desc:"How to contribute: issue-first workflow, PR process, CI requirements, coding standards.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"CONTRIBUTORS.md", type:"docs", role:"info", icon:"👥", desc:"List of everyone who has contributed to the project.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"CODE_OF_CONDUCT.md", type:"docs", role:"info", icon:"📜", desc:"Contributor Covenant 2.1. Community standards, enforcement process, and reporting contacts.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },

  { path:"SUPPORT.md", type:"docs", role:"info", icon:"💬", desc:"Where to get help: Discord for questions, GitHub Issues for bugs. Keeps the issue tracker clean.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"TRADEMARK.md", type:"docs", role:"info", icon:"™️", desc:"Trademark usage guidelines for the career-ops name and logo.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"LEGAL_DISCLAIMER.md", type:"docs", role:"info", icon:"⚖️", desc:"Legal disclaimers about the tool — not professional career advice, use at your own risk.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"LICENSE", type:"docs", role:"info", icon:"📄", desc:"MIT License. You can use, modify, and distribute freely with attribution.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },
  { path:"CITATION.cff", type:"docs", role:"info", icon:"🎓", desc:"Citation file format for academic/research use. Allows researchers to properly cite career-ops in papers.", reads:[], writes:[], calls:[], calledby:[], update:"risk" },

  // SCRIPTS
  { path:"generate-pdf.mjs", type:"script", role:"system", icon:"📄", desc:"HTML → PDF via Playwright Chromium. Reads an HTML file, resolves font paths to absolute file:// URLs, runs ATS normalization (replaces em-dashes, smart quotes, zero-width chars), then renders to PDF. Supports letter and A4 format.", reads:["fonts/","templates/cv-template.html"], writes:["output/*.pdf"], calls:["playwright"], calledby:["modes/pdf.md","modes/auto-pipeline.md"], update:"risk" },
  { path:"generate-latex.mjs", type:"script", role:"system", icon:"📐", desc:"LaTeX CV validator and compiler. Validates a .tex file against expected structure, then runs pdflatex to compile it. Alternative to the HTML/PDF pipeline for users who prefer LaTeX/Overleaf.", reads:["templates/cv-template.tex"], writes:["output/*.pdf"], calls:["pdflatex"], calledby:["modes/latex.md"], update:"risk" },

  { path:"merge-tracker.mjs", type:"script", role:"system", icon:"🔀", desc:"Safely merges TSV rows from batch/tracker-additions/ into data/applications.md. Handles column-order swap, deduplication, and formatting. Run after every batch of evaluations.", reads:["batch/tracker-additions/*.tsv","data/applications.md"], writes:["data/applications.md"], calls:[], calledby:["modes/auto-pipeline.md (manual step)"], update:"risk" },

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const TYPE_COLORS = {
  user:'#3b82f6', brain:'#0d9488', script:'#7c3aed',
  cfg:'#d97706', docs:'#6b7280', ci:'#db2777', asset:'#0ea5e9', output:'#16a34a'
};
const TYPE_LABELS = {
  user:'User Layer', brain:'Brain Layer', script:'Script',
  cfg:'Config', docs:'Docs/Asset', ci:'CI/GitHub', asset:'Asset'
};
const UPDATE_LABELS = {
  safe:'🔒 Safe from updates', risk:'⚠️ Overwritten by updates', na:'✅ Not in update path'
};
const ROLE_COLORS  = { configure:'#f59e0b', ai:'#0891b2', info:'#9ca3af', system:'#7c3aed' };
const ROLE_LABELS  = { configure:'✏️ You configure', ai:'🤖 AI instructions', info:'📖 Reference only', system:'⚙️ System / auto' };
const ROLE_CLASSES = { configure:'rb-configure', ai:'rb-ai', info:'rb-info', system:'rb-system' };

let activeTypeFilter = 'all';
let activeFile = null;

// ── BUILD TREE ───────────────────────────────────────────────────────────────
function buildTree() {
  const groups = {};
  FILES.forEach(f => {
    const parts = f.path.split('/');
    const group = parts.length === 1 ? '(root)' : parts[0];
    if (!groups[group]) groups[group] = [];
    groups[group].push(f);
  });

  const order = ['(root)','modes','config','templates','providers','dashboard','batch','data','interview-prep','writing-samples','fonts','examples','docs','.claude','.agents','.gemini','.qwen','.claude-plugin','.github'];
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  order.forEach(group => {
    if (!groups[group]) return;
    const label = document.createElement('div');
    label.className = 'dir-label open';
    label.innerHTML = `<span class="arrow">▶</span>${group === '(root)' ? '/ root' : group}/`;
    label.onclick = () => label.classList.toggle('open');

    const children = document.createElement('div');
    children.className = 'dir-children';

    groups[group].forEach(f => {
      const row = document.createElement('div');
      row.className = 'file-row';
      row.dataset.type = f.type;
      row.dataset.role = f.role;
      row.dataset.path = f.path;
      const name = f.path.split('/').pop();
      const roleColor = ROLE_COLORS[f.role] || '#888';
      row.innerHTML = `
        <span class="dot" style="background:${TYPE_COLORS[f.type]||'#888'}"></span>
        <span class="name">${name}</span>
        <span class="role-pip" style="background:${roleColor}" title="${ROLE_LABELS[f.role]||f.role}"></span>`;
      row.onclick = () => showFile(f, row);
      children.appendChild(row);
    });

    tree.appendChild(label);
    tree.appendChild(children);
  });
  updateStats();
}

// ── SHOW FILE ────────────────────────────────────────────────────────────────
function showFile(f, row) {
  document.querySelectorAll('.file-row').forEach(r => r.classList.remove('active'));
  row.classList.add('active');
  activeFile = f;

  const color    = TYPE_COLORS[f.type] || '#888';
  const typeLabel = TYPE_LABELS[f.type] || f.type;
  const ud       = UPDATE_LABELS[f.update] || '';
  const udClass  = f.update === 'safe' ? 'ub-safe' : f.update === 'na' ? 'ub-na' : 'ub-risk';
  const roleLabel = ROLE_LABELS[f.role] || f.role;
  const roleClass = ROLE_CLASSES[f.role] || 'rb-info';

  const makeTagRow = (items, cls, lbl) => items.length
    ? `<div class="section-label">${lbl}</div><div class="tag-row">${items.map(t=>`<span class="tag ${cls}">${t}</span>`).join('')}</div>`
    : '';

  document.getElementById('detail').innerHTML = `
    <div class="file-card">
      <div class="file-card-header">
        <div class="file-icon" style="background:${color}22">${f.icon}</div>
        <div>
          <h2>${f.path.split('/').pop()}</h2>
          <div class="file-path-full">${f.path}</div>
          <div class="badges-row">
            <span class="type-badge" style="color:${color};border-color:${color}44;background:${color}11">${typeLabel}</span>
            <span class="role-badge ${roleClass}">${roleLabel}</span>
            <span class="update-badge ${udClass}">${ud}</span>
          </div>
        </div>
      </div>
      <div class="section-label">What it does</div>
      <div class="desc-text">${f.desc}</div>
      ${makeTagRow(f.reads,   'reads',    'Reads from')}
      ${makeTagRow(f.writes,  'writes',   'Writes to')}
      ${makeTagRow(f.calls,   'calls',    'Calls / invokes')}
      ${makeTagRow(f.calledby,'calledby', 'Invoked by')}
    </div>`;
}

// ── FILTER ───────────────────────────────────────────────────────────────────
function filterFiles(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.file-row').forEach(row => {
    const path      = row.dataset.path.toLowerCase();
    const typeMatch = activeTypeFilter === 'all' || row.dataset.type === activeTypeFilter;
    const textMatch = !q || path.includes(q);
    row.classList.toggle('hidden', !typeMatch || !textMatch);
  });
  updateStats();
}

function setTypeFilter(t) {
  activeTypeFilter = t;
  document.querySelectorAll('.fp[data-t]').forEach(p => p.classList.toggle('active', p.dataset.t === t));
  filterFiles(document.getElementById('search').value);
}

// ── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const visible = [...document.querySelectorAll('.file-row:not(.hidden)')].length;
  const total   = FILES.length;
  const counts  = {};
  FILES.forEach(f => counts[f.type] = (counts[f.type]||0)+1);
  document.getElementById('stats').innerHTML =
    `<div class="stat"><strong>${visible}</strong> / ${total} files shown</div>` +
    Object.entries(counts).map(([t,n]) =>
      `<div class="stat"><span class="dot" style="background:${TYPE_COLORS[t]}"></span>${TYPE_LABELS[t]||t}: <strong>${n}</strong></div>`
    ).join('');
}

buildTree();
</script>
